name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fork PR でも秘密は渡さない。権限は読み取りのみ。
permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dji-fcpxml:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@b4ffde65f46336b88bd3af2d455e36f6668f2c91 # v4.1.1
      - uses: actions/setup-python@0a5c61591373683505be7e54183a8256f0c1eb9 # v5.0.0
        with:
          python-version: "3.11"
      - name: Run rewrite tests
        run: python3 tests/test_rewrite.py
        working-directory: skills/dji-fcpxml
