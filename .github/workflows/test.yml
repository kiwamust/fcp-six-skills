name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fork PR でも秘密は渡さない。権限は読み取りのみ。
permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dji-fcpxml:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run rewrite tests
        run: python3 tests/test_rewrite.py
        working-directory: skills/dji-fcpxml
