name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dji-fcpxml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run rewrite tests
        run: python3 tests/test_rewrite.py
        working-directory: skills/dji-fcpxml
